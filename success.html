<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent — Shree Balaji Trader</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #fdfaf6;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }
    .card {
      background: #fff;
      border: 1px solid #e8ddd0;
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
    }
    .icon {
      width: 72px; height: 72px;
      background: #edf7f0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 700;
      color: #1e1510; margin-bottom: 12px;
    }
    p {
      font-size: 16px; color: #9a8878;
      line-height: 1.7; margin-bottom: 32px;
    }
    a {
      display: inline-block;
      background: #b6783f; color: #fff;
      padding: 14px 32px; border-radius: 8px;
      text-decoration: none; font-size: 15px; font-weight: 600;
      transition: background 0.25s;
    }
    a:hover { background: #d4975a; }
    .brand {
      margin-top: 28px; font-size: 13px; color: #c8b8a8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Message Sent!</h1>
    <p>Shukriya! Humne aapka message receive kar liya hai.<br>Hum jald hi aapko contact karenge.</p>
    <a href="/">← Wapas Jaiye</a>
    <div class="brand">Shree Balaji Trader</div>
  </div>
</body>
</html>
